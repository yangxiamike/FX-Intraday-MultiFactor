services:
  postgres:
    image: postgres:16
    container_name: fxmf-postgres
    environment:
      POSTGRES_USER: fxmf
      POSTGRES_PASSWORD: fxmf
      POSTGRES_DB: fxmf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: fxmf-prefect-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://fxmf:fxmf@postgres:5432/fxmf
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"

  api:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    container_name: fxmf-api
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started
    env_file:
      - .env.example
    environment:
      FXMF_PROJECT_ROOT: /workspace
      FXMF_DATA_ROOT: /workspace/runtime_data
      FXMF_REGISTRY_PATH: /workspace/runtime_data/registry/registry.sqlite3
      FXMF_REGISTRY_DSN: postgresql://fxmf:fxmf@postgres:5432/fxmf
      PREFECT_API_URL: http://prefect-server:4200/api
    command: uvicorn services.api.app:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  worker:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    container_name: fxmf-worker
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started
    env_file:
      - .env.example
    environment:
      FXMF_PROJECT_ROOT: /workspace
      FXMF_DATA_ROOT: /workspace/runtime_data
      FXMF_REGISTRY_PATH: /workspace/runtime_data/registry/registry.sqlite3
      FXMF_REGISTRY_DSN: postgresql://fxmf:fxmf@postgres:5432/fxmf
      PREFECT_API_URL: http://prefect-server:4200/api
    command: python -m services.worker.flows
    volumes:
      - .:/workspace

  jupyterlab:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    container_name: fxmf-jupyter
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started
    env_file:
      - .env.example
    environment:
      FXMF_PROJECT_ROOT: /workspace
      FXMF_DATA_ROOT: /workspace/runtime_data
      FXMF_REGISTRY_PATH: /workspace/runtime_data/registry/registry.sqlite3
      FXMF_REGISTRY_DSN: postgresql://fxmf:fxmf@postgres:5432/fxmf
      PREFECT_API_URL: http://prefect-server:4200/api
    command: python -m jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace

volumes:
  postgres_data:

